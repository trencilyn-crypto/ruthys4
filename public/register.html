<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Ruthy's Eatery</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="navbar">
    <a class="brand" href="/">
      <span class="logo">RE</span>
      <span>Ruthy's Eatery</span>
    </a>
    <div class="nav-actions">
      <a class="button secondary" href="/login.html">login</a>
    </div>
  </header>

  <main class="container auth-wrap">
    <section class="auth-card">
      <span class="kicker">customer account</span>
      <h1 style="font-size:2.2rem;">create account</h1>
      <p class="lead">register first before submitting your booking request.</p>
      <div id="registerMessage" class="message"></div>
      <form id="registerForm" class="form-grid">
        <label>
          full name
          <input type="text" name="fullName" placeholder="Juan Dela Cruz" required />
        </label>
        <label>
          email
          <input type="email" name="email" placeholder="you@example.com" required />
        </label>
        <label>
          phone number
          <input type="text" name="phone" placeholder="09123456789" required />
        </label>
        <label>
          password
          <input type="password" name="password" placeholder="at least 8 characters" minlength="8" required />
        </label>
        <button type="submit">create customer account</button>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
